<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Punto Digital Chaguarpamba</title>

  <link rel="icon" type="image/png" href="img/favicon.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

</head>

<body class="min-h-screen text-[#1F2A44] bg-[#F8F9FA] overflow-x-hidden">

  <!-- FONDO ANIMADO -->
  <div id="animated-bg" class="fixed inset-0 overflow-hidden pointer-events-none -z-10"></div>

  <!-- HEADER RESPONSIVO -->
  <header id="main-header" class="fixed w-full z-50 transition-all duration-300 bg-transparent py-4 md:py-6">
    <div class="container mx-auto px-4 md:px-6 flex justify-between items-center">

      <div class="flex items-center space-x-2 cursor-pointer shrink-0" onclick="navigate('inicio')">
        <div class="text-xl md:text-2xl font-light tracking-tighter">
          <span id="logo-de" class="text-white">PDG |</span>
          <span id="logo-name" class="font-bold ml-1 text-white">Chaguarpamba</span>
        </div>
      </div>

      <!-- Nav Desktop -->
      <nav class="hidden lg:flex items-center space-x-4 xl:space-x-6">
        <button id="nav-btn-inicio" onclick="navigate('inicio')"
          class="text-[10px] font-bold tracking-[0.2em] uppercase transition-all relative group text-white/70 hover:text-white">HOME<span
            class="nav-ul absolute -bottom-1 left-0 h-0.5 bg-[#00A3E0] transition-all duration-300 w-0 group-hover:w-full"></span></button>
        <div class="relative group">
          <button id="nav-btn-inst"
            class="flex items-center text-[10px] font-bold tracking-[0.2em] uppercase transition-colors text-white/70 hover:text-white">
            INSTITUCIÓN <i data-lucide="chevron-down" style="width:14px;height:14px;" class="ml-1"></i>
          </button>
          <div
            class="absolute top-full right-0 mt-2 w-48 bg-white shadow-xl rounded-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 py-2 z-50">
            <button onclick="navigate('sobre-nosotros')"
              class="w-full text-left px-4 py-2 hover:bg-blue-50 text-sm">Sobre Nosotros</button>
            <button onclick="navigate('mision-vision')"
              class="w-full text-left px-4 py-2 hover:bg-blue-50 text-sm">Misión y Visión</button>
          </div>
        </div>
        <button id="nav-btn-noticias" onclick="navigate('noticias')"
          class="text-[10px] font-bold tracking-[0.2em] uppercase transition-all relative group text-white/70 hover:text-white">NOTICIAS<span
            class="nav-ul absolute -bottom-1 left-0 h-0.5 bg-[#00A3E0] transition-all duration-300 w-0 group-hover:w-full"></span></button>
        <button id="nav-btn-servicios" onclick="navigate('servicios')"
          class="text-[10px] font-bold tracking-[0.2em] uppercase transition-all relative group text-white/70 hover:text-white">SERVICIOS<span
            class="nav-ul absolute -bottom-1 left-0 h-0.5 bg-[#00A3E0] transition-all duration-300 w-0 group-hover:w-full"></span></button>
        <button id="nav-btn-capacitaciones" onclick="navigate('capacitaciones')"
          class="text-[10px] font-bold tracking-[0.2em] uppercase transition-all relative group text-white/70 hover:text-white">CAPACITACIONES<span
            class="nav-ul absolute -bottom-1 left-0 h-0.5 bg-[#00A3E0] transition-all duration-300 w-0 group-hover:w-full"></span></button>
        <button id="nav-btn-contacto" onclick="navigate('contacto')"
          class="text-[10px] font-bold tracking-[0.2em] uppercase transition-all relative group text-white/70 hover:text-white">CONTACTO<span
            class="nav-ul absolute -bottom-1 left-0 h-0.5 bg-[#00A3E0] transition-all duration-300 w-0 group-hover:w-full"></span></button>
      </nav>

      <button class="lg:hidden p-2" onclick="toggleMenu()">
        <i id="mobile-menu-icon" data-lucide="menu" style="width:28px;height:28px;"
          class="text-white transition-colors duration-300"></i>
      </button>
    </div>
  </header>

  <!-- MOBILE MENU OVERLAY -->
  <div id="mobile-menu"
    class="fixed inset-0 bg-white z-[60] flex flex-col items-center justify-center space-y-6 text-xl font-bold text-[#003087] transition-transform duration-500 translate-x-full">
    <button onclick="toggleMenu()" class="absolute top-6 right-6 text-[#003087]"><i data-lucide="x"
        style="width:36px;height:36px;"></i></button>
    <button onclick="navigate('inicio')" class="hover:text-[#00A3E0]">Inicio</button>
    <button onclick="navigate('sobre-nosotros')" class="hover:text-[#00A3E0]">Sobre Nosotros</button>
    <button onclick="navigate('mision-vision')" class="hover:text-[#00A3E0]">Misión y Visión</button>
    <button onclick="navigate('noticias')" class="hover:text-[#00A3E0]">Noticias</button>
    <button onclick="navigate('servicios')" class="hover:text-[#00A3E0]">Servicios</button>
    <button onclick="navigate('capacitaciones')" class="hover:text-[#00A3E0]">Capacitaciones</button>
    <button onclick="navigate('contacto')" class="hover:text-[#00A3E0]">Contacto</button>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main-content" class="min-h-[80vh]"></div>

  <!-- FOOTER -->
  <footer class="bg-[#1F2A44] text-white pt-12 md:pt-16 pb-8">
    <div
      class="container mx-auto px-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10 text-sm text-center sm:text-left">
      <div class="col-span-1 sm:col-span-2 lg:col-span-2">
        <div class="text-2xl font-light mb-6"><span>PDG |</span> <span class="font-bold">Chaguarpamba</span></div>
        <p class="text-gray-400 max-w-md mx-auto sm:mx-0">Ministerio de Telecomunicaciones y de la Sociedad de la
          Información.</p>
      </div>
      <div>
        <h4 class="font-bold mb-6 text-[#00A3E0] uppercase tracking-widest text-xs">Información</h4>
        <ul class="space-y-3 text-gray-400">
          <li><button onclick="navigate('noticias')" class="hover:text-white">Noticias Destacadas</button></li>
          <li><button onclick="navigate('servicios')" class="hover:text-white">Servicios Gratuitos</button></li>
          <li><button onclick="navigate('capacitaciones')" class="hover:text-white">Capacitaciones</button></li>
        </ul>
      </div>
      <div>
        <h4 class="font-bold mb-6 text-[#00A3E0] uppercase tracking-widest text-xs">Ubicación</h4>
        <p class="text-gray-400 leading-relaxed">Calle 10 de Agosto y San Juan Bautista, Chaguarpamba, Provincia de
          Loja.</p>
      </div>
    </div>
    <div class="container mx-auto px-6 mt-12 pt-8 border-t border-gray-700 text-center text-xs text-gray-500">
      <p>© 2026 Punto Digital Gratuito Chaguarpamba | Derechos Reservados</p>
    </div>
  </footer>

  <!-- MODAL CONTAINER -->
  <div id="modal-container"></div>

  <!-- ===== SCRIPTS (orden de dependencia) ===== -->
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/news.js"></script>
  <script src="js/pages/about.js"></script>
  <script src="js/pages/mission.js"></script>
  <script src="js/pages/services.js"></script>
  <script src="js/pages/training.js"></script>
  <script src="js/pages/contact.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
